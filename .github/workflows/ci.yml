name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format
        run: pnpm run check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (mock mode)
        run: pnpm run build:mock

  publish:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: NPM_TOKEN
    permissions:
      contents: read
    steps:
      - name: Check NPM_TOKEN
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN is not configured. Skipping npm publish. Add a Repository secret or Environment secret named NPM_TOKEN."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.npm_token.outputs.configured == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.npm_token.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.npm_token.outputs.configured == 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.npm_token.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Set publish version
        if: steps.npm_token.outputs.configured == 'true'
        run: node scripts/set-publish-version.mjs "1.0.${{ github.run_number }}"

      - name: Configure npm auth for pnpm
        if: steps.npm_token.outputs.configured == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo "registry=https://registry.npmjs.org/"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "@fecommunity:registry=https://registry.npmjs.org/"
          } > "${HOME}/.npmrc"

      - name: Publish to npm
        if: steps.npm_token.outputs.configured == 'true'
        run: pnpm publish --access public --no-git-checks
