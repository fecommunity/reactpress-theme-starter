name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:check

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Production build
        env:
          REACTPRESS_API_URL: https://reactpress-theme-starter.vercel.app/api
          NEXT_PUBLIC_REACTPRESS_API_URL: https://reactpress-theme-starter.vercel.app/api
          CLIENT_SITE_URL: https://gaoredu.com
        run: pnpm run build
