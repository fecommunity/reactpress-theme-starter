name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:check

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Start mock ReactPress API
        run: node scripts/mock-api/server.mjs &

      - name: Wait for mock API
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST http://127.0.0.1:3010/api/setting/get > /dev/null; then
              echo "Mock API ready"
              exit 0
            fi
            sleep 1
          done
          echo "Mock API failed to start"
          exit 1

      - name: Production build
        env:
          REACTPRESS_API_URL: http://127.0.0.1:3010/api
          NEXT_PUBLIC_REACTPRESS_API_URL: http://127.0.0.1:3010/api
          CLIENT_SITE_URL: https://example.com
        run: pnpm run build
